market: US
market_name: US Stock Market
currency: USD
timezone: America/New_York
database_path: data/stock_agent.sqlite
log_dir: logs

universe:
  symbols:
    - NVDA
    - MSFT
    - AAPL
    - AMZN

data_sources:
  price: yfinance
  fundamentals: builtin
  news: builtin
  social: builtin

technical_indicators:
  moving_average: [5, 20, 60, 120]
  rsi_period: 14
  volume_ma: [5, 20]

score_weights:
  speculation:
    price_breakout: 20
    volume_breakout: 20
    price_alignment: 20
    social_heat: 20
    news_heat: 20
  growth:
    revenue_yoy: 30
    eps_growth: 25
    gross_margin: 15
    roe: 15
    price_trend: 15
  quality:
    roe_stability: 25
    dividend_stability: 20
    free_cash_flow: 20
    debt_ratio: 15
    drawdown_control: 20

report:
  language: zh-TW
  output_dir: reports/daily
  telegram_enabled: false
  top_n: 10

ai:
  enabled: false
